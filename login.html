<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TO BE NUMBER ONE | Secure Login</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Inter:wght@400;600;700&display=swap"
            rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <script
            src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
        <script
            src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
        <script
            src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

        <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #6366f1;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --input-bg: #f3f4f6;
            --text-dark: #1f2937;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Sarabun', sans-serif; background: var(--bg-gradient); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .login-card { background: var(--card-bg); width: 90%; max-width: 420px; padding: 50px 40px; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); z-index: 10; text-align: center; position: relative; }
        .logo-wrapper { width: 110px; height: 110px; margin: -105px auto 25px; background: white; padding: 5px; border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; border: 4px solid var(--card-bg); }
        .logo-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .header h1 { font-size: 24px; color: var(--text-dark); margin-bottom: 5px; }
        .form-group { margin-bottom: 20px; position: relative; }
        .input-box { position: relative; display: flex; align-items: center; }
        .input-box i { position: absolute; left: 20px; color: #9ca3af; }
        .input-box input { width: 100%; padding: 16px 20px 16px 55px; border: 2px solid transparent; border-radius: 30px; background: var(--input-bg); font-size: 15px; outline: none; transition: 0.3s; }
        .input-box input:focus { background: #fff; border-color: var(--primary-color); }

        .btn-submit { width: 100%; padding: 16px; margin-top: 10px; border: none; border-radius: 30px; background: linear-gradient(to right, var(--primary-color), var(--secondary-color)); color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { transform: scale(1.02); opacity: 0.9; }
    </style>
    </head>
    <body>

        <div class="login-card">
            <div class="logo-wrapper">
                <img src="img/2bkc.jpg" alt="Logo">
            </div>

            <div class="header">
                <h1>TO BE NUMBER ONE</h1>
                <p
                    style="font-size: 12px; color: gray; margin-bottom: 30px;">ระบบจัดการสมาชิก
                    (Firebase)</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <div class="input-box">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="email"
                            placeholder="ชื่อผู้ใช้แอดมิน (Username)" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-box">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password"
                            placeholder="รหัสผ่าน" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span>เข้าสู่ระบบ</span>
                </button>
            </form>
        </div>

        <script>
        // 1. ตั้งค่า Firebase Configuration
const firebaseConfig = {
    apiKey: "AIzaSyDi_0wqnyZ8AChvTXguj3Xwv07jEW7TOok",
    authDomain: "bkc-bc48f.firebaseapp.com",
    projectId: "bkc-bc48f",
    storageBucket: "bkc-bc48f.firebasestorage.app",
    messagingSenderId: "486986521782",
    appId: "1:486986521782:web:da67a6a47d6f01b98e9a17",
    databaseURL: "https://bkc-bc48f-default-rtdb.asia-southeast1.firebasedatabase.app" // เพิ่มบรรทัดนี้
};

// เริ่มต้น Firebase
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const database = firebase.database();

const loginForm = document.getElementById('loginForm');
const submitBtn = document.getElementById('submitBtn');

// 2. ฟังก์ชัน Login ด้วย Realtime Database
loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังตรวจสอบ...';

    const username = document.getElementById('email').value.trim(); // ใช้ช่อง email เดิมแต่ใส่ username
    const password = document.getElementById('password').value.trim();

    // ไปดึงข้อมูลจากโหนด admin/[username]
    database.ref('admin/' + username).once('value')
        .then((snapshot) => {
            const adminData = snapshot.val();

            if (adminData && adminData.password == password) {
                // Login สำเร็จ!
                alert('✅ ยินดีต้อนรับเข้าสู่ระบบ');
                // เก็บสถานะล็อกอินสั้นๆ ใน SessionStorage
                sessionStorage.setItem('isAdminLoggedIn', 'true');
                sessionStorage.setItem('adminUsername', username); // เพิ่มบรรทัดนี้เพื่อเก็บชื่อแอดมิน
                window.location.href = 'admin.html';
            } else {
                // ข้อมูลไม่ตรง หรือไม่มีชื่อผู้ใช้นี้
                throw new Error('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
            }
        })
        .catch((error) => {
            alert('⚠️ ' + error.message);
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'เข้าสู่ระบบ';
        });
});
    </script>
    </body>
</html>
